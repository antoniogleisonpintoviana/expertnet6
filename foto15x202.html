<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Otimizador Expert Net - Fotos 14,5x19,5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* Reset básico e fontes da Index */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #F8AF31; /* Fundo amarelo/laranja principal da index */
            color: #000000;
        }

        /* --- CABEÇALHO IGUAL AO INDEX --- */
        header {
            background-color: #B8B8B8;
            padding: 30px 50px;
            display: flex;
            align-items: center;
            border-bottom: 4px solid #F8AF31;
            margin-bottom: 20px;
        }

        .logo-placeholder {
            width: 120px;
            height: 100px;
            position: relative;
            margin-right: 30px;
        }
        
        .triangle {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 45px solid transparent;
            border-right: 45px solid transparent;
        }
        .tri-1 {
            border-bottom: 80px solid #F8AF31;
            top: 0; left: 10px;
            opacity: 0.8;
        }
        .tri-2 {
            border-bottom: 80px solid #222;
            top: 20px; left: 30px;
        }
        .tri-3 {
            border-bottom: 80px solid #F8CE7A;
            top: 10px; left: -10px;
            opacity: 0.8;
        }

        .header-titles h1 {
            font-size: 3.5rem;
            color: #111;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 1;
        }

        .header-titles h2 {
            font-size: 1.2rem;
            color: #222;
            font-weight: 600;
            margin-top: 5px;
            letter-spacing: 1px;
        }
        /* --- FIM DO CABEÇALHO --- */

        .container {
            max-width: 22cm;
            margin: 0 auto;
            padding: 0 20px 40px 20px;
        }

        .controles { 
            margin-bottom: 15px; 
            background: #0E0E0E; /* Cor da faixa preta da index */
            color: #FFFFFF; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0px 4px 6px rgba(0,0,0,0.3);
        }
        
        .controles h2 {
            margin-bottom: 15px;
            color: #F8AF31;
        }

        .controles button {
            background-color: #F8AF31;
            color: #0E0E0E;
            border: none;
            padding: 10px 15px;
            font-weight: bold;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .controles button:hover {
            background-color: #F8CE7A;
        }

        .preview-container {
            position: relative;
            width: 21cm;
            height: 29.7cm;
            border: 2px solid #000;
            background-color: white; 
            margin: 0 auto;
            overflow: hidden;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.5); 
        }

        .img-preview {
            width: 19.5cm;  
            height: 14.5cm; 
            position: absolute;
            object-fit: cover;
            background-color: #ddd;
            border: 0.1mm solid #000;
            transition: all 0.3s ease-in-out;
            transform-origin: center center;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-placeholder">
            <div class="triangle tri-3"></div>
            <div class="triangle tri-1"></div>
            <div class="triangle tri-2"></div>
        </div>
        
        <div class="header-titles">
            <h1>EXPERT NET</h1>
            <h2>SERVIÇOS DE IMPRESSÃO</h2>
        </div>
    </header>

    <div class="container">
        <div class="controles">
            <h2>Otimizador de Impressão 14,5 x 19,5</h2>
            <input type="file" id="inputFile" accept="image/*" multiple>
            <br>
            <button onclick="mostrarImagem()">Carregar Fotos</button>
            <button onclick="gerarPDF()">Gerar PDF para Impressão</button>
            <p style="margin-top: 10px;"><small>Pressione as teclas numéricas 1 ou 2 para girar cada foto individualmente.</small></p>
        </div>

        <div class="preview-container">
            <img id="img1" class="img-preview" style="top: 0.2cm; left: 0.75cm;">
            <img id="img2" class="img-preview" style="top: 15.0cm; left: 0.75cm;">
        </div>
    </div>

<script>
    let angulos = [0, 0];
    const ids = ["img1", "img2"];

    const MARGEM_SUPERIOR = 0.2;
    const MARGEM_ESQUERDA = 0.75; 
    const LARGURA_FOTO = 19.5;
    const ALTURA_FOTO = 14.5;
    const ESPACAMENTO = 0.3; 

    document.addEventListener('keydown', (event) => {
        const tecla = parseInt(event.key);
        if (tecla >= 1 && tecla <= 2) {
            girarFoto(tecla - 1);
        }
    });

    function girarFoto(index) {
        angulos[index] = (angulos[index] + 90) % 360;
        atualizarLayout();
    }

    function atualizarLayout() {
        ids.forEach((id, i) => {
            const el = document.getElementById(id);
            const estaGirado = (angulos[i] / 90) % 2 !== 0;
            
            el.style.transform = `rotate(${angulos[i]}deg)`;
            
            let topPos;
            let leftPos = MARGEM_ESQUERDA;

            if (i === 0) {
                topPos = MARGEM_SUPERIOR;
                if (estaGirado) {
                    topPos += 2.5;
                    leftPos += 2.5;
                }
            } else {
                const cimaGirado = (angulos[0] / 90) % 2 !== 0;
                let alturaOcupadaCima = cimaGirado ? LARGURA_FOTO : ALTURA_FOTO;
                
                topPos = MARGEM_SUPERIOR + alturaOcupadaCima + ESPACAMENTO;
                if (estaGirado) {
                    topPos += 2.5;
                    leftPos += 2.5;
                }
            }

            el.style.top = topPos + "cm";
            el.style.left = leftPos + "cm";
        });
    }

    function mostrarImagem() {
        const input = document.getElementById("inputFile");
        const files = input.files;
        for (let i = 0; i < ids.length; i++) {
            if (files[i]) document.getElementById(ids[i]).src = URL.createObjectURL(files[i]);
        }
    }

    function canvasProcess(img, angulo) {
        return new Promise((resolve) => {
            if (!img.src || img.src.includes('undefined')) return resolve(null);
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");
            const girado = (angulo / 90) % 2 !== 0;
            const w = img.naturalWidth;
            const h = img.naturalHeight;
            canvas.width = girado ? h : w;
            canvas.height = girado ? w : h;
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.rotate((angulo * Math.PI) / 180);
            ctx.drawImage(img, -w / 2, -h / 2);
            resolve(canvas.toDataURL("image/jpeg", 0.8));
        });
    }

    async function gerarPDF() {
        const { jsPDF } = window.jspdf;
        let pdf = new jsPDF({ unit: "cm", format: "a4" });

        for (let i = 0; i < ids.length; i++) {
            const el = document.getElementById(ids[i]);
            const base64 = await canvasProcess(el, angulos[i]);
            
            if (base64) {
                const estaGirado = (angulos[i] / 90) % 2 !== 0;
                const col = MARGEM_ESQUERDA;
                
                let row;
                if (i === 0) {
                    row = MARGEM_SUPERIOR;
                } else {
                    const cimaGirado = (angulos[0] / 90) % 2 !== 0;
                    row = MARGEM_SUPERIOR + (cimaGirado ? LARGURA_FOTO : ALTURA_FOTO) + ESPACAMENTO;
                }

                pdf.addImage(
                    base64, 
                    "JPEG", 
                    col, 
                    row, 
                    estaGirado ? ALTURA_FOTO : LARGURA_FOTO, 
                    estaGirado ? LARGURA_FOTO : ALTURA_FOTO
                );
            }
        }
        pdf.save("impressao_2fotos_14.5x19.5.pdf");
    }
</script>
</body>
</html>
