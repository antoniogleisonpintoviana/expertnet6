<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerador de Impressão A4 - Expert Net</title>
    <!-- Bibliotecas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; background: #F8AF31; margin: 0; padding: 0; text-align: center; padding-bottom: 40px; }
        header { background-color: #B8B8B8; padding: 15px 30px; display: flex; align-items: center; justify-content: center; border-bottom: 4px solid #0E0E0E; margin-bottom: 30px; }
        .logo-placeholder { width: 90px; height: 75px; position: relative; margin-right: 20px; transform: scale(0.7); }
        .triangle { position: absolute; width: 0; height: 0; border-left: 45px solid transparent; border-right: 45px solid transparent; }
        .tri-1 { border-bottom: 80px solid #F8AF31; top: 0; left: 10px; opacity: 0.8; }
        .tri-2 { border-bottom: 80px solid #222; top: 20px; left: 30px; }
        .tri-3 { border-bottom: 80px solid #F8CE7A; top: 10px; left: -10px; opacity: 0.8; }
        .header-titles { text-align: left; }
        .header-titles h1 { font-size: 2.2rem; color: #111; font-weight: 900; margin: 0; text-transform: uppercase; line-height: 1; }
        .container { background: white; padding: 25px; border-radius: 10px; max-width: 950px; margin: auto; box-shadow: 0 5px 20px rgba(0,0,0,0.3); border: 2px solid #0E0E0E; }
        button { padding: 10px 15px; margin: 10px; cursor: pointer; border: none; background: #0E0E0E; color: #F8AF31; font-weight: bold; border-radius: 5px; }
        #pagina { margin-top: 25px; background: white; border: 2px solid #333; position: relative; margin-left: auto; margin-right: auto; }
        .imgItem { position: absolute; overflow: hidden; border: 1px dashed #777; }
        .imgItem img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <header>
        <div class="logo-placeholder">
            <div class="triangle tri-3"></div><div class="triangle tri-1"></div><div class="triangle tri-2"></div>
        </div>
        <div class="header-titles">
            <h1>EXPERT NET</h1>
            <h2>SERVIÇOS DE IMPRESSÃO</h2>
        </div>
    </header>
    <div class="container">
        <input type="number" id="largura" placeholder="Largura (cm)">
        <input type="number" id="altura" placeholder="Altura (cm)">
        <input type="number" id="margem" value="0.1" step="0.1">
        <select id="orientacao"><option value="retrato">Retrato</option><option value="paisagem">Paisagem</option></select>
        <input type="file" id="upload" multiple><br>
        <button onclick="calcular()">Gerar Layout</button>
        <button onclick="gerarPDF()">Gerar PDF</button>
        <button onclick="gerarWord()">Baixar em Word</button>
        <button onclick="limparTudo()">Limpar Tudo</button>
        <div id="pagina"></div>
    </div>

<script>
    let imagensBase64 = [];
    let removidas = [];
    const { Document, Packer, Paragraph, Table, TableRow, TableCell, ImageRun, WidthType, BorderStyle } = docx;

    document.getElementById("upload").addEventListener("change", function(e){
        imagensBase64 = []; removidas = [];
        let files = e.target.files;
        for(let i=0; i<files.length; i++){
            let reader = new FileReader();
            reader.onload = function(evt){ imagensBase64.push(evt.target.result); }
            reader.readAsDataURL(files[i]);
        }
    });

    function calcular(){
        removidas = [];
        let largura = parseFloat(document.getElementById("largura").value);
        let altura = parseFloat(document.getElementById("altura").value);
        let margem = parseFloat(document.getElementById("margem").value);
        if (isNaN(largura) || isNaN(altura)) { alert("Preencha Largura e Altura!"); return; }
        let orientacao = document.getElementById("orientacao").value;
        let pageW = (orientacao == "paisagem") ? 29.7 : 21;
        let pageH = (orientacao == "paisagem") ? 21 : 29.7;
        let col = Math.floor(pageW / (largura + (margem * 2)));
        let lin = Math.floor(pageH / (altura + (margem * 2)));
        desenharPagina(col, lin, largura, altura, margem, pageW, pageH);
    }

    function desenharPagina(col, lin, largura, altura, margem, pageW, pageH){
        let pagina = document.getElementById("pagina");
        let escala = 25;
        pagina.style.width = (pageW * escala) + "px";
        pagina.style.height = (pageH * escala) + "px";
        pagina.innerHTML = "";
        let larguraTotal = largura + (margem * 2);
        let alturaTotal = altura + (margem * 2);
        for(let i = 0; i < col * lin; i++){
            if(removidas.includes(i)) continue;
            let x = i % col;
            let y = Math.floor(i / col);
            let div = document.createElement("div");
            div.className = "imgItem";
            div.style.left = (x * larguraTotal * escala) + "px";
            div.style.top = (y * alturaTotal * escala) + "px";
            div.style.width = (largura * escala) + "px";
            div.style.height = (altura * escala) + "px";
            if(imagensBase64.length > 0){
                let img = document.createElement("img");
                img.src = imagensBase64[i % imagensBase64.length];
                img.onclick = function(){ removidas.push(i); calcular(); };
                div.appendChild(img);
            }
            pagina.appendChild(div);
        }
    }

    async function gerarWord() {
        if(imagensBase64.length === 0) { alert("Gere o layout primeiro!"); return; }
        
        const doc = new Document({ sections: [{ children: [] }] });
        alert("Gerando arquivo Word...");
        
        Packer.toBlob(doc).then(blob => {
            saveAs(blob, "layout_impressao.docx");
        });
    }

    function gerarPDF(){
        let largura = parseFloat(document.getElementById("largura").value);
        let altura = parseFloat(document.getElementById("altura").value);
        let margem = parseFloat(document.getElementById("margem").value);
        if (isNaN(largura)) { alert("Gere o layout primeiro."); return; }
        let orientacao = document.getElementById("orientacao").value;
        const {jsPDF} = window.jspdf;
        let pdf = new jsPDF({ orientation: (orientacao == "paisagem" ? "l" : "p"), unit: "cm", format: "a4" });
        
        // Lógica de repetição para PDF...
        pdf.save("impressao.pdf");
    }

    function limparTudo(){ location.reload(); }
</script>
</body>
</html>
